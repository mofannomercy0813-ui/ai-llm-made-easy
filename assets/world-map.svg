<svg viewBox="0 0 680 520" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>AI 大模型世界地图 —— 26 课学习路径</title>
  <desc>五个部分：世界观、引擎、炼金、落地、实战，共 26 课</desc>

  <!-- Background -->
  <rect width="680" height="520" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="340" y="32" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="500" fill="#2C2C2A">AI 大模型世界地图</text>
  <text x="340" y="52" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888780">26 课，五站旅程——从零到面试通关</text>

  <!-- ===== PART 0: INTRO ===== -->
  <circle cx="340" cy="90" r="22" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/>
  <text x="340" y="94" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#0C447C">开篇</text>
  <text x="340" y="128" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888780">第 0 课 · 地图</text>

  <!-- Arrow 0→1 -->
  <line x1="340" y1="112" x2="340" y2="148" stroke="#378ADD" stroke-width="1.5"/>
  <polygon points="336,144 340,152 344,144" fill="#378ADD"/>

  <!-- ===== PART 1: WORLDVIEW ===== -->
  <rect x="50" y="156" width="580" height="52" rx="10" fill="#E6F1FB" stroke="#85B7EB" stroke-width="1"/>
  <text x="70" y="180" font-family="sans-serif" font-size="13" font-weight="500" fill="#0C447C">第一部分：世界观 —— 大模型到底是个什么东西</text>
  <text x="70" y="198" font-family="sans-serif" font-size="11" fill="#185FA5">第 1-5 课：Token · 涌现与幻觉 · Prompt/CoT/ICL · RLHF 速览 · 量化/蒸馏/分布式</text>

  <!-- Arrow 1→2 -->
  <line x1="340" y1="208" x2="340" y2="232" stroke="#378ADD" stroke-width="1.5"/>
  <polygon points="336,228 340,236 344,228" fill="#378ADD"/>

  <!-- ===== PART 2: ENGINE ===== -->
  <rect x="50" y="240" width="580" height="68" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text x="70" y="264" font-family="sans-serif" font-size="13" font-weight="500" fill="#0C447C">第二部分：引擎 —— Transformer 里里外外</text>
  <text x="70" y="284" font-family="sans-serif" font-size="11" fill="#185FA5">第 6-13 课：Transformer · Attention 手写 · 多头注意力 · 位置编码 ·</text>
  <text x="70" y="300" font-family="sans-serif" font-size="11" fill="#185FA5">残差连接 · LayerNorm · Pre/Post-norm · 两种 Mask</text>

  <!-- Arrow 2→3 -->
  <line x1="340" y1="308" x2="340" y2="332" stroke="#378ADD" stroke-width="1.5"/>
  <polygon points="336,328 340,336 344,328" fill="#378ADD"/>

  <!-- ===== PART 3: TRAINING ===== -->
  <rect x="50" y="340" width="580" height="52" rx="10" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="1"/>
  <text x="70" y="364" font-family="sans-serif" font-size="13" font-weight="500" fill="#3C3489">第三部分：炼金 —— 模型是怎么训出来的</text>
  <text x="70" y="382" font-family="sans-serif" font-size="11" fill="#534AB7">第 14-19 课：参数量/数据量 · MLM/CLM · RLHF 全流程 · DPO/GRPO · LoRA · 训练硬核</text>

  <!-- Arrow 3→4 -->
  <line x1="340" y1="392" x2="340" y2="412" stroke="#7F77DD" stroke-width="1.5"/>
  <polygon points="336,408 340,416 344,408" fill="#7F77DD"/>

  <!-- ===== PART 4: ENGINEERING ===== -->
  <rect x="50" y="420" width="580" height="52" rx="10" fill="#FAECE7" stroke="#F0997B" stroke-width="1"/>
  <text x="70" y="444" font-family="sans-serif" font-size="13" font-weight="500" fill="#993C1D">第四部分：落地 —— 大模型的十八般武艺</text>
  <text x="70" y="462" font-family="sans-serif" font-size="11" fill="#D85A30">第 20-24 课：RAG · 推理优化 · Agent · MCP/A2A · 前沿架构(MoE/DeepSeek)</text>

  <!-- Arrow 4→5 -->
  <line x1="340" y1="472" x2="340" y2="488" stroke="#D85A30" stroke-width="1.5"/>
  <polygon points="336,484 340,492 344,484" fill="#D85A30"/>

  <!-- ===== PART 5: INTERVIEW ===== -->
  <circle cx="340" cy="504" r="14" fill="#1D9E75" stroke="#0F6E56" stroke-width="1"/>
  <text x="340" y="508" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="500" fill="#FFFFFF">实战</text>
  <text x="370" y="508" font-family="sans-serif" font-size="11" fill="#0F6E56">第 25-26 课 · 大厂面试</text>
</svg>
