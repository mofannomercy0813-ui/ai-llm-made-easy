<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480">
  <title>Attention Mechanism: Four Computation Steps</title>
  <desc>Step-by-step computation of scaled dot-product attention: Q×K^T, scale by √d_k, Softmax, ×V.</desc>

  <!-- Background -->
  <rect width="680" height="480" fill="#FAFAFA" rx="6"/>

  <style>
    text { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; }
  </style>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#2C2C2C">Scaled Dot-Product Attention</text>
  <text x="340" y="46" text-anchor="middle" font-size="10" fill="#888">Attention(Q, K, V) = softmax(Q×K^T / √d_k) × V</text>

  <!-- ============ Panel 1: Q × K^T ============ -->
  <rect x="20" y="62" width="145" height="28" rx="4" fill="#E8F0FB"/>
  <circle cx="40" cy="76" r="10" fill="#378ADD"/>
  <text x="40" y="80" text-anchor="middle" font-size="9" font-weight="700" fill="#FFF">1</text>
  <text x="56" y="80" font-size="12" font-weight="600" fill="#1a5a9a">Q × K^T → Scores</text>

  <!-- Matrices -->
  <!-- Q matrix -->
  <rect x="20" y="100" width="56" height="76" rx="3" fill="#378ADD" opacity="0.15"/>
  <text x="48" y="142" text-anchor="middle" font-size="9" fill="#1a5a9a">Q</text>
  <text x="48" y="156" text-anchor="middle" font-size="8" fill="#666">n×d_k</text>

  <!-- × sign -->
  <text x="90" y="146" font-size="16" fill="#2C2C2C">×</text>

  <!-- K^T matrix -->
  <rect x="104" y="100" width="76" height="56" rx="3" fill="#378ADD" opacity="0.15"/>
  <text x="142" y="134" text-anchor="middle" font-size="9" fill="#1a5a9a">K^T</text>
  <text x="142" y="148" text-anchor="middle" font-size="8" fill="#666">d_k×n</text>

  <!-- = -->
  <text x="196" y="146" font-size="16" fill="#2C2C2C">=</text>

  <!-- Result: n×n matrix -->
  <rect x="215" y="100" width="90" height="90" rx="3" fill="#378ADD" opacity="0.08"/>
  <!-- Grid inside -->
  <line x1="215" y1="122" x2="305" y2="122" stroke="#378ADD" stroke-width="0.5" opacity="0.25"/>
  <line x1="215" y1="145" x2="305" y2="145" stroke="#378ADD" stroke-width="0.5" opacity="0.25"/>
  <line x1="215" y1="168" x2="305" y2="168" stroke="#378ADD" stroke-width="0.5" opacity="0.25"/>
  <line x1="238" y1="100" x2="238" y2="190" stroke="#378ADD" stroke-width="0.5" opacity="0.25"/>
  <line x1="260" y1="100" x2="260" y2="190" stroke="#378ADD" stroke-width="0.5" opacity="0.25"/>
  <line x1="283" y1="100" x2="283" y2="190" stroke="#378ADD" stroke-width="0.5" opacity="0.25"/>
  <text x="260" y="200" text-anchor="middle" font-size="9" fill="#666">Scores (n×n)</text>

  <!-- Arrow to next step -->
  <line x1="340" y1="145" x2="364" y2="145" stroke="#888" stroke-width="1.2" marker-end="url(#arrowGray)"/>

  <!-- ============ Panel 2: /√d_k ============ -->
  <rect x="368" y="62" width="292" height="28" rx="4" fill="#E8F0FB"/>
  <circle cx="388" cy="76" r="10" fill="#378ADD"/>
  <text x="388" y="80" text-anchor="middle" font-size="9" font-weight="700" fill="#FFF">2</text>
  <text x="404" y="80" font-size="12" font-weight="600" fill="#1a5a9a">Scale by √d_k</text>

  <!-- Scaled matrix -->
  <rect x="368" y="100" width="90" height="90" rx="3" fill="#378ADD" opacity="0.08"/>
  <line x1="368" y1="122" x2="458" y2="122" stroke="#378ADD" stroke-width="0.5" opacity="0.25"/>
  <line x1="368" y1="145" x2="458" y2="145" stroke="#378ADD" stroke-width="0.5" opacity="0.25"/>
  <line x1="368" y1="168" x2="458" y2="168" stroke="#378ADD" stroke-width="0.5" opacity="0.25"/>
  <line x1="391" y1="100" x2="391" y2="190" stroke="#378ADD" stroke-width="0.5" opacity="0.25"/>
  <line x1="413" y1="100" x2="413" y2="190" stroke="#378ADD" stroke-width="0.5" opacity="0.25"/>
  <line x1="436" y1="100" x2="436" y2="190" stroke="#378ADD" stroke-width="0.5" opacity="0.25"/>

  <!-- Division indicator -->
  <text x="478" y="125" font-size="13" fill="#888">÷ √d_k</text>
  <line x1="478" y1="130" x2="520" y2="130" stroke="#888" stroke-width="1"/>

  <text x="413" y="200" text-anchor="middle" font-size="9" fill="#666">Scaled Scores</text>

  <!-- Arrow -->
  <line x1="500" y1="145" x2="524" y2="145" stroke="#888" stroke-width="1.2" marker-end="url(#arrowGray)"/>

  <!-- ============ Panel 3: Softmax (wrapped to next row) ============ -->
  <rect x="20" y="228" width="145" height="28" rx="4" fill="#E8F0FB"/>
  <circle cx="40" cy="242" r="10" fill="#378ADD"/>
  <text x="40" y="246" text-anchor="middle" font-size="9" font-weight="700" fill="#FFF">3</text>
  <text x="56" y="246" font-size="12" font-weight="600" fill="#1a5a9a">Softmax → Weights</text>

  <!-- Matrix -->
  <rect x="20" y="266" width="90" height="90" rx="3" fill="#378ADD" opacity="0.08"/>
  
  <!-- Row 1 bar chart inside cells -->
  <rect x="23" y="269" width="20" height="14" rx="2" fill="#378ADD" opacity="0.3"/>
  <rect x="45" y="269" width="20" height="14" rx="2" fill="#378ADD" opacity="0.5"/>
  <rect x="67" y="269" width="20" height="14" rx="2" fill="#378ADD" opacity="0.2"/>
  <rect x="89" y="269" width="18" height="14" rx="2" fill="#378ADD" opacity="0.35"/>

  <!-- Row 2 bars -->
  <rect x="23" y="291" width="20" height="14" rx="2" fill="#378ADD" opacity="0.2"/>
  <rect x="45" y="291" width="20" height="14" rx="2" fill="#378ADD" opacity="0.55"/>
  <rect x="67" y="291" width="20" height="14" rx="2" fill="#378ADD" opacity="0.3"/>
  <rect x="89" y="291" width="18" height="14" rx="2" fill="#378ADD" opacity="0.15"/>

  <!-- Row 3 bars -->
  <rect x="23" y="313" width="20" height="14" rx="2" fill="#378ADD" opacity="0.25"/>
  <rect x="45" y="313" width="20" height="14" rx="2" fill="#378ADD" opacity="0.4"/>
  <rect x="67" y="313" width="20" height="14" rx="2" fill="#378ADD" opacity="0.6"/>
  <rect x="89" y="313" width="18" height="14" rx="2" fill="#378ADD" opacity="0.3"/>

  <!-- Row 4 bars -->
  <rect x="23" y="335" width="20" height="14" rx="2" fill="#378ADD" opacity="0.3"/>
  <rect x="45" y="335" width="20" height="14" rx="2" fill="#378ADD" opacity="0.15"/>
  <rect x="67" y="335" width="20" height="14" rx="2" fill="#378ADD" opacity="0.45"/>
  <rect x="89" y="335" width="18" height="14" rx="2" fill="#378ADD" opacity="0.55"/>

  <text x="65" y="370" text-anchor="middle" font-size="9" fill="#666">Row sums = 1</text>

  <!-- Annotation -->
  <text x="130" y="296" font-size="10" fill="#777">Each row</text>
  <text x="130" y="312" font-size="10" fill="#777">sums to 1</text>
  <text x="130" y="328" font-size="10" fill="#777">(distribution</text>
  <text x="130" y="344" font-size="10" fill="#777">over keys)</text>

  <!-- Arrow -->
  <line x1="340" y1="311" x2="364" y2="311" stroke="#888" stroke-width="1.2" marker-end="url(#arrowGray)"/>

  <!-- ============ Panel 4: × V ============ -->
  <rect x="368" y="228" width="292" height="28" rx="4" fill="#E8F0FB"/>
  <circle cx="388" cy="242" r="10" fill="#378ADD"/>
  <text x="388" y="246" text-anchor="middle" font-size="9" font-weight="700" fill="#FFF">4</text>
  <text x="404" y="246" font-size="12" font-weight="600" fill="#1a5a9a">Weights × V → Output</text>

  <!-- Weights matrix -->
  <rect x="368" y="266" width="72" height="72" rx="3" fill="#378ADD" opacity="0.12"/>
  <line x1="368" y1="284" x2="440" y2="284" stroke="#378ADD" stroke-width="0.5" opacity="0.2"/>
  <line x1="368" y1="302" x2="440" y2="302" stroke="#378ADD" stroke-width="0.5" opacity="0.2"/>
  <line x1="368" y1="320" x2="440" y2="320" stroke="#378ADD" stroke-width="0.5" opacity="0.2"/>
  <text x="404" y="314" text-anchor="middle" font-size="9" fill="#555">Weights</text>

  <text x="454" y="306" font-size="14" fill="#2C2C2C">×</text>

  <!-- V matrix -->
  <rect x="472" y="266" width="76" height="56" rx="3" fill="#378ADD" opacity="0.15"/>
  <text x="510" y="300" text-anchor="middle" font-size="9" fill="#1a5a9a">V</text>
  <text x="510" y="314" text-anchor="middle" font-size="8" fill="#666">n×d_v</text>

  <text x="562" y="306" font-size="14" fill="#2C2C2C">=</text>

  <!-- Output -->
  <rect x="580" y="266" width="80" height="56" rx="3" fill="#378ADD" opacity="0.08"/>
  <text x="620" y="300" text-anchor="middle" font-size="9" fill="#1a5a9a">Output</text>

  <!-- ============ Bottom: Formula recap ============ -->
  <rect x="20" y="400" width="640" height="60" rx="6" fill="#F5F5F5"/>
  
  <!-- Formula cards -->
  <rect x="38" y="412" width="130" height="36" rx="4" fill="#FFF" stroke="#378ADD" stroke-width="0.8"/>
  <text x="103" y="426" text-anchor="middle" font-size="10" fill="#555">Step 1</text>
  <text x="103" y="440" text-anchor="middle" font-size="11" font-weight="600" fill="#1a5a9a">S = Q · K^T</text>

  <rect x="180" y="412" width="130" height="36" rx="4" fill="#FFF" stroke="#378ADD" stroke-width="0.8"/>
  <text x="245" y="426" text-anchor="middle" font-size="10" fill="#555">Step 2</text>
  <text x="245" y="440" text-anchor="middle" font-size="11" font-weight="600" fill="#1a5a9a">S' = S / √d_k</text>

  <rect x="322" y="412" width="130" height="36" rx="4" fill="#FFF" stroke="#378ADD" stroke-width="0.8"/>
  <text x="387" y="426" text-anchor="middle" font-size="10" fill="#555">Step 3</text>
  <text x="387" y="440" text-anchor="middle" font-size="11" font-weight="600" fill="#1a5a9a">A = softmax(S')</text>

  <rect x="464" y="412" width="130" height="36" rx="4" fill="#FFF" stroke="#378ADD" stroke-width="0.8"/>
  <text x="529" y="426" text-anchor="middle" font-size="10" fill="#555">Step 4</text>
  <text x="529" y="440" text-anchor="middle" font-size="11" font-weight="600" fill="#1a5a9a">Out = A · V</text>

  <defs>
    <marker id="arrowGray" viewBox="0 0 8 6" refX="8" refY="3" markerWidth="6" markerHeight="4" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#888"/>
    </marker>
  </defs>
</svg>